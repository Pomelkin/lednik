redis:
  host: pomelka.pro
  port: 12576
  stream_name: validation_tasks

data:
  datasets:
    RuBQ-Reranking: a1c152d6491e43959cd8da88658e2e05
    Mixed-Summarization-Dataset: 2ef9572e96d94bc69ace31aa2de05387
    ru-HNP: 4cafe217d08242dc858ecf5e3347683e
  batch_size: 16
  num_workers: 5
  query_colname: query-tokens
  pos_colname: pos-tokens
  neg_colname: neg-tokens
  val_label_colname: label
  val_num_labels: 6

trainer:
  accelerator: "cuda"
  max_epochs: 2
  strategy:
    type: "fsdp1"
    param_dtype: bfloat16
    reduce_dtype: float32
    buffer_dtype: bfloat16
  val_check_interval: 0.2
  devices: 4
  precision: bf16-true
  log_every_n_steps: 25
  limit_val_batches: 1000

early_stopping:
  monitor: "val_loss"
  patience: 3
  mode: "min"
  min_delta: 0.01

checkpoint:
  save_top_k: 3
  mode: "min"
  monitor: "val_loss"
  filename: "{epoch:02d}-{val_loss:.4f}"

teacher_model_id: af954495ff03440abc58790c4e41ff22
student_model_id: 5621a1d159754611b72c638d27810fb9
tokenizer_id: 34beac693bfa4977b23cafea8b3d6379

model_cfg:
  model_type: lednik
  embeddings_dropout: 0.1
  attention_dropout: 0.0
  out_attn_dropout: 0.1
  mlp_dropout: 0.1
