redis:
  host: 127.0.0.1
  port: 6379
  stream_name: validation_tasks

data:
  datasets:
    RuBQ-Reranking: c049af4036604631b3c9329d89ec42d9
    Mixed-Summarization-Dataset: 0f220e334eed4e39b74839c1ec8d0587
    ru-HNP: e43f250d4b4a4fccad0bd4aa30b9a5f3
  batch_size: 32
  num_workers: 5
  query_colname: query-tokens
  pos_colname: pos-tokens
  neg_colname: neg-tokens
  val_label_colname: label
  val_num_labels: 6

trainer:
  accelerator: "cuda"
  max_epochs: 6
  strategy:
    type: "ddp"
    find_unused_parameters: true
  val_check_interval: 0.2
  devices: 4
  precision: bf16-mixed
  log_every_n_steps: 25

early_stopping:
  monitor: "val_loss"
  patience: 5
  mode: "min"
  min_delta: 0.01

checkpoint:
  save_top_k: 3
  mode: "min"
  monitor: "val_loss"
  filename: "ep|{epoch}-step|{step}-loss|{val_loss:.5f}"

teacher_model_id: af954495ff03440abc58790c4e41ff22
student_model_id: 749be3f1fd7341e09d33911c633c7c0a
tokenizer_id: 34beac693bfa4977b23cafea8b3d6379

model_cfg:
  model_type: static_embeddings
  embeddings_dropout: 0.2
