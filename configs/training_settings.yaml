runner_config:
  mrr_config:
    qdrant_host: 127.0.0.1
    qdrant_port: 6333
    mrr_top_k: 10
  logreg_config:
    lr: 1.0
    weight_decay: 0.01
    solver: "LBFGS"
    tol: 1e-4
    batch_size: -1
    total_steps: 100
  knn_config:
    k: 5
  scatter_num_points: 200
  device: "cpu"

data:
  datasets:
    ru-HNP: 79fcccb7143c48f79ddf300bfd5ee1e4
    Mixed-Summarization: 173599873b46449fa9b4ad6350a657bf
  aug_prob: 0.35
  batch_size: 240
  num_workers: 6
  query_tok_colname: query-tokens
  query_text_colname: query
  pos_tok_colname: pos-tokens
  pos_text_colname: pos
  #neg_tok_colname: neg-tokens
  query_teacher_embedding_colname: query-embedding
  pos_teacher_embedding_colname: pos-embedding
  #neg_teacher_embedding_colname: neg-embedding
  val_label_colname: label
  val_num_labels: 6

checkpoint:
  save_top_k: 3
  mode: "min"
  monitor: "val_loss"
  filename: "|{epoch}|-|{step}|-|{val_loss:.5f}|"

teacher_model_id: af954495ff03440abc58790c4e41ff22
student_model_id: 316e940db6eb4f95a36f67d9dbc77fe8
tokenizer_id: 34beac693bfa4977b23cafea8b3d6379

trainer:
  accelerator: "cuda"
  max_epochs: 225
  strategy:
    type: "ddp"
  val_check_interval: 1.0
  devices: [ 0, 1 ]
  precision: bf16-true
  log_every_n_steps: 25

distill_config:
  grad_clip_val: 2.0
  distillation_method:
    type: direct-distillation
    loss_type: cosine
    contrastive_loss_weight: 0.7
    temperature: 0.07
  optimizer:
    type: AdamW8bit
    betas: [ 0.9, 0.98 ]
    block_size: 128
    bf16_stochastic_round: true
  lr:
    scheduler_type: plateau-with-cosine-annealing
    warmup_ratio: 0.1
    warmup_value: 1e-5
    base_value: 3e-4
    final_value: 1e-6
    plateau_ratio: 0.8
  weight_decay:
    base_value: 0.02
  freeze_student_emb_steps_ratio: 0.1

model_cfg:
  model_type: lednik
  override_params:
    embedding_dropout: 0.15
    attention_dropout: 0.0
    out_attn_dropout: 0.1
    mlp_dropout: 0.1
