redis:
  host: 127.0.0.1
  port: 6379
  stream_name: validation_tasks

data:
  datasets:
    ru-HNP: b5bed59771fc4bf78084ce666ba95adb
    Mixed-Summarization: 0752e238d3634f83b865f7d9bf8ba97c
  batch_size: 32
  num_workers: 4
  query_colname: query-tokens
  pos_colname: pos-tokens
  neg_colname: neg-tokens
  val_label_colname: label
  val_num_labels: 6

trainer:
  accelerator: "cuda"
  max_epochs: 8
  strategy:
    type: "fsdp1"
    param_dtype: bfloat16
    reduce_dtype: float32
    buffer_dtype: float32
  val_check_interval: 0.2
  devices: 2
  precision: bf16-true
  log_every_n_steps: 25

early_stopping:
  monitor: "val_loss"
  patience: 5
  mode: "min"
  min_delta: 0.01

checkpoint:
  save_top_k: 3
  mode: "min"
  monitor: "val_loss"
  filename: "|{epoch}|-|{step}|-|{val_loss:.5f}|"

teacher_model_id: a29c25552ec840d38cbf8cd821b322c0
student_model_id: 04b4b00287a04536bd22baa62475fb9a
tokenizer_id: 975d03016e7e4523a27f6189707cc2e6

model_cfg:
  model_type: static_embeddings
  embeddings_dropout: 0.15
  # attention_dropout: 0.0
  # out_attn_dropout: 0.0
  # mlp_dropout: 0.0
