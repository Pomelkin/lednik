name: lednik

services:
  flash_attention_builder:
    build:
      context: .
      dockerfile: docker/buildFlashAttention.Dockerfile
      args:
        - HOST_UID=${HOST_UID:?Please set HOST_UID environment variable}
        - HOST_GID=${HOST_GID:?Please set HOST_GID environment variable}
        - HOST_USER=${HOST_USER:?Please set HOST_USER environment variable}
    container_name: flash_attention_builder
    volumes:
      - ${HOME:?HOME is required}/.cache/uv:/home/${HOST_USER}/.cache/uv # uv cache on host FS
      - ./:/home/${HOST_USER}/app/ # project directory
      - /home/${HOST_USER}/app/.venv # exclude host .venv from the bind mount
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: [ "5", "6" ]
              capabilities: [ gpu ]
    profiles:
      - interactive

  qdrant:
    image: qdrant/qdrant:v1.17
    container_name: qdrant
    ports:
      - '127.0.0.1:6333:6333'
    profiles:
      - training

  redis:
    image: redis:8.6.2-trixie
    container_name: redis
    ports:
      - '0.0.0.0:6379:6379'
    command: redis-server
    profiles:
      - training

  serving:
    build:
      context: .
      dockerfile: docker/serving.Dockerfile
      network: host
      args:
        - HOST_UID=${HOST_UID:?HOST_UID is required}
        - HOST_GID=${HOST_GID:?HOST_GID is required}
        - HOST_USER=${HOST_USER:?HOST_USER is required}
    container_name: lednik-serving
    volumes:
      - ${HOME:?HOME is required}/clearml.conf:/home/${HOST_USER}/clearml.conf:ro # clearml config file
      - ${HOME:?HOME is required}/.cache/huggingface:/home/${HOST_USER}/.cache/huggingface # HF Hub cache on host FS
      - ${HOME:?HOME is required}/.clearml-docker:/home/${HOST_USER}/.clearml # clearml cache directory
      - /tmp/nvidia-mps:/tmp/nvidia-mps # NVIDIA MPS socket directory
      - ${HOME}/.cache/lednik-triton:/home/${HOST_USER}/.triton
    environment:
      - TRITON_CACHE_AUTOTUNING=1
    ports:
      - '0.0.0.0:8000:8000'
    command:
      - --model
      - ${SERVING_MODEL:?SERVING_MODEL is required}
      - --tokenizer
      - ${SERVING_TOKENIZER:?SERVING_TOKENIZER is required}
      - --max-batch-size
      - ${SERVING_MAX_BATCH_SIZE:-1}
      - --batch-timeout
      - ${SERVING_BATCH_TIMEOUT:-0.0}
      - --devices
      - ${SERVING_DEVICES:-1}
      - --num-workers
      - ${SERVING_NUM_WORKERS:-1}
      - --fast-queue
      - ${SERVING_FAST_QUEUE:-false}
      - --max-seq-length
      - ${SERVING_MAX_SEQ_LENGTH:-8192}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: [ "0" ]
              capabilities: [ gpu ]
    profiles:
      - serving
    shm_size: 4G

  training:
    build:
      context: .
      dockerfile: docker/training.Dockerfile
      network: host
      args:
        - HOST_UID=${HOST_UID:?HOST_UID is required}
        - HOST_GID=${HOST_GID:?HOST_GID is required}
        - HOST_USER=${HOST_USER:?HOST_USER is required}

    container_name: "emelyan.egorov-training"
    volumes:
      - ${HOME:?HOME is required}/clearml-pomelk1n.conf:/home/${HOST_USER}/clearml.conf:ro # clearml config file
      - ${HOME:?HOME is required}/.clearml-docker:/home/${HOST_USER}/.clearml # clearml cache directory
      - ${HOME:?HOME is required}/.local/share/fish:/home/${HOST_USER}/.local/share/fish # fish
      - ${HOME:?HOME is required}/.cache/uv:/home/${HOST_USER}/.cache/uv # uv cache on host FS
      - ./:/home/${HOST_USER}/lednik/ # project directory
      - /home/${HOST_USER}/lednik/.venv # exclude host .venv from the bind mount
    environment:
      - PYTHONPATH=/home/${HOST_USER}/lednik
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
    network_mode: host
    working_dir: /home/${HOST_USER}/lednik

    user: "${HOST_UID:?HOST_UID is required}:${HOST_GID:?HOST_GID is required}"

    cpuset: 0-31
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: [ "5", "6" ]
              capabilities: [ gpu ]
    ipc: host
    mem_limit: 128G
    profiles:
      - interactive
    shm_size: 4G
    stdin_open: true
    tty: true
