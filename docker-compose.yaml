name: lednik

services:
  qdrant:
    image: qdrant/qdrant:v1.17
    container_name: qdrant
    ports:
      - '127.0.0.1:6333:6333'
    profiles:
      - qdrant

  redis:
    image: redis:8.6.2-trixie
    container_name: redis
    ports:
      - '127.0.0.1:6379:6379'
    command: redis-server --requirepass ${REDIS_PASSWORD}
